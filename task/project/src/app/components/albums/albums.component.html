<section class="albums">
  <h1>Albums</h1>

  @if (loading) {
    <p class="status">Loading albums...</p>
  } @else {
    @if (error) {
      <p class="status error">{{ error }}</p>
    }

    @if (albums.length === 0) {
      <p class="status">No albums available.</p>
    } @else {
      <ul class="album-list">
        @for (album of albums; track album.id) {
          <li class="album-item">
            <a [routerLink]="['/albums', album.id]">
              <span class="id">#{{ album.id }}</span>
              <span class="title">{{ album.title }}</span>
            </a>
            <button
              type="button"
              [disabled]="deletingId === album.id"
              (click)="deleteAlbum(album.id)"
            >
              {{ deletingId === album.id ? 'Deleting...' : 'Delete' }}
            </button>
          </li>
        }
      </ul>
    }
  }
</section>
